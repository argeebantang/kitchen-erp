version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kitchen_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kitchen
      POSTGRES_PASSWORD: kitchen_secret
      POSTGRES_DB: kitchen_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kitchen -d kitchen_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kitchen_erp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
